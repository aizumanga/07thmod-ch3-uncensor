name: Prepare v0.2.0 installer release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/prepare_v0_2_release.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Start v0.2.0 release build
    runs-on: ubuntu-22.04
    steps:
      - name: Dispatch tagged draft release build
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run build_and_release.yml
          --repo "${{ github.repository }}"
          --ref main
          -f release_tag=v0.2.0
