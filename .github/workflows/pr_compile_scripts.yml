name: Validate and build Chapter 3 package

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  build:
    name: Build custom Tatarigoroshi package
    runs-on: ubuntu-22.04
    env:
      UPSTREAM_VERSION: v6.1.5
    steps:
      - name: Force git to use CRLF (on ubuntu runner, will checkout as LF otherwise)
        run: git config --global core.autocrlf true # Forces LF on the server to convert to CRLF locally

      - name: Checkout the overlay repository
        uses: actions/checkout@v4

      - name: Validate the scoped changes
        run: python3 tools/validate_ch3_patch.py

      - name: Checkout the pinned upstream script repository
        uses: actions/checkout@v4
        with:
          repository: 07th-mod/tatarigoroshi
          ref: ${{ env.UPSTREAM_VERSION }}
          path: upstream

      - name: Apply the Chapter 3 overlay
        run: |
          cp Update/tata_013_02.txt upstream/Update/tata_013_02.txt
          cp OGSprites/sa_tn_bi_a1.png upstream/OGSprites/sa_tn_bi_a1.png
          cp OGSprites/sa_tn_hn_a1.png upstream/OGSprites/sa_tn_hn_a1.png
          cp OGSprites/sa_tn_sa_a1.png upstream/OGSprites/sa_tn_sa_a1.png

      - name: Checkout the higurashi-assembly (DLL) repository
        uses: actions/checkout@v4
        with:
          repository: 07th-mod/higurashi-assembly
          ref: tata-mod
          path: upstream/dll

      - name: Compile DLL
        run: msbuild /p:Configuration=Release
        working-directory: upstream/dll

      - name: Compile standalone Higurashi Script Compiler
        run: msbuild /p:Configuration=ScriptCompiler
        working-directory: upstream/dll

      - name: Save Git Hash
        run: >-
          git show --pretty="format:Commit: %H %d%nDate: %cs%n%n%B" --no-patch > ./bin/Release/Assembly-CSharp.version.txt
        working-directory: upstream/dll

      - name: Move bin/ folder out of dll/ folder
        run: mv upstream/dll/bin upstream/

      - name: Run Release Script
        run: |
          curl -OJ https://raw.githubusercontent.com/07th-mod/higurashi_release/master/deploy_higurashi/deploy_higurashi.py
          python deploy_higurashi.py tatarigoroshi
          rm deploy_higurashi.py
        working-directory: upstream

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: tatarigoroshi-ch3-original-art-variant
          path: upstream/output/*.zip

  release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download compiled package
        uses: actions/download-artifact@v4
        with:
          name: tatarigoroshi-ch3-original-art-variant
          path: release-files

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
          draft: true
          name: ${{ github.ref_name }}
          body: |
            Custom Chapter 3 script package based on 07th-Mod Tatarigoroshi v6.1.5.
            The alternate sprite calls are limited to GCensor 0 with Original art.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
